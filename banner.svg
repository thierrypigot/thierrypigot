<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#0A0F16"/>
      <stop offset="55%" stop-color="#1C2633"/>
      <stop offset="100%" stop-color="#2A3A4E"/>
    </linearGradient>
    <linearGradient id="orangeH" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#F7981B"/>
      <stop offset="100%" stop-color="#FABB5E"/>
    </linearGradient>
    <linearGradient id="cardAccent" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#F7981B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F7981B" stop-opacity="0.06"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Top orange bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#orangeH)"/>

  <!-- Left vertical bar -->
  <rect x="60" y="48" width="4" height="326" rx="2" fill="#F7981B"/>

  <!-- [WP] watermark -->
  <text x="1050" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="160" font-weight="800" fill="#FFFFFF" fill-opacity="0.025"
        text-anchor="middle">[WP]</text>

  <!-- WeAre[WP] pill -->
  <rect x="80" y="48" width="176" height="36" rx="18" fill="#F7981B"/>
  <text x="168" y="71" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#1C2633" text-anchor="middle" letter-spacing="0.5">WeAre[WP]</text>

  <!-- Name -->
  <text x="80" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Thierry Pigot</text>

  <!-- Title -->
  <text x="80" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="19" font-weight="400" fill="#8A9DB3">Expert WordPress · Fondateur WeAre[WP] · Agence &amp; Maintenance WordPress</text>

  <!-- Tagline -->
  <text x="80" y="243" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="16" fill="#F7981B" font-style="italic">« Nous ne faisons pas des sites pour nos clients, mais pour les leurs »</text>

  <!-- Separator -->
  <line x1="80" y1="268" x2="830" y2="268" stroke="#3A4F69" stroke-width="1" stroke-opacity="0.7"/>

  <!-- === STATS CARDS === -->
  <!-- Card 1 : 20+ ans -->
  <rect x="80" y="282" width="182" height="112" rx="10" fill="#FFFFFF" fill-opacity="0.04" stroke="#3A4F69" stroke-width="1"/>
  <text x="171" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="40" font-weight="700" fill="#F7981B" text-anchor="middle">20+</text>
  <text x="171" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#8A9DB3" text-anchor="middle">ans de WordPress</text>
  <text x="171" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#5A7189" text-anchor="middle">depuis 2005</text>

  <!-- Card 2 : 16 WordCamps -->
  <rect x="276" y="282" width="182" height="112" rx="10" fill="#FFFFFF" fill-opacity="0.04" stroke="#3A4F69" stroke-width="1"/>
  <text x="367" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="40" font-weight="700" fill="#F7981B" text-anchor="middle">16</text>
  <text x="367" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#8A9DB3" text-anchor="middle">WordCamps</text>
  <text x="367" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#5A7189" text-anchor="middle">speaker · orga · bénévole</text>

  <!-- Card 3 : 1 700 membres -->
  <rect x="472" y="282" width="182" height="112" rx="10" fill="#FFFFFF" fill-opacity="0.04" stroke="#3A4F69" stroke-width="1"/>
  <text x="563" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="40" font-weight="700" fill="#F7981B" text-anchor="middle">1 700</text>
  <text x="563" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#8A9DB3" text-anchor="middle">membres WP Paris</text>
  <text x="563" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#5A7189" text-anchor="middle">co-fondateur du meetup</text>

  <!-- Card 4 : 150+ maintenance -->
  <rect x="668" y="282" width="182" height="112" rx="10" fill="#FFFFFF" fill-opacity="0.04" stroke="#3A4F69" stroke-width="1"/>
  <text x="759" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="40" font-weight="700" fill="#F7981B" text-anchor="middle">150+</text>
  <text x="759" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#8A9DB3" text-anchor="middle">clients maintenance</text>
  <text x="759" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="11" fill="#5A7189" text-anchor="middle">WordPress actifs</text>

  <!-- Card 5 : Trustpilot (accented / orange) -->
  <rect x="864" y="282" width="212" height="112" rx="10" fill="url(#cardAccent)" stroke="#F7981B" stroke-width="1" stroke-opacity="0.5"/>
  <text x="970" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="36" font-weight="700" fill="#F7981B" text-anchor="middle">150+ avis</text>
  <text x="970" y="354" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="15" fill="#FABB5E" text-anchor="middle">★★★★★</text>
  <text x="970" y="376" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="12" fill="#F7981B" text-anchor="middle">Trustpilot — Google</text>

  <!-- Bottom orange bar -->
  <rect x="0" y="415" width="1200" height="5" fill="url(#orangeH)"/>
</svg>
